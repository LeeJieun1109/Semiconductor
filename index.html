<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Semiconductor Engineering Portfolio</title>
    <style>
        /* CSS 주석은 이렇게 슬래시와 별표를 사용합니다 */
        
        body {
            background-color: #2c2c2c; 
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* [신규] 내비게이션 바 스타일 */
        .navbar {
            width: 100%;
            background-color: #1a1a1a; 
            display: flex;
            justify-content: center;
            padding: 15px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.3);
        }
        .navbar ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 40px;
        }
        .navbar a {
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .header {
            text-align: center;
            margin: 50px 0;
        }
        .header h1 {
            color: white;
            font-size: 3rem;
            margin: 0;
        }
        .header p {
            color: white;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* [신규] 1x4 그리드 스타일 */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(4, 200px); 
            grid-gap: 20px;
            margin-bottom: 80px;
        }

        /* [기존 2x2 스타일 보관용 - CSS에서는 /* */ 로 주석처리] */
        /*
        .main-grid {
            display: grid;
            grid-template-columns: repeat(2, 200px);
            grid-gap: 20px;
            margin-bottom: 80px;
        }
        */

        .square-card {
            width: 200px;
            height: 200px;
            background-color: white;
            border-radius: 20px;
            text-decoration: none;
            color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.3s;
        }
        .square-card:hover { transform: scale(1.05); }
        .square-card h2 { font-size: 1.4rem; margin: 0; line-height: 1.2; }
        .square-card p { font-size: 0.85rem; margin-top: 10px; }

        /* [신규] 하단 흰색 배경 섹션 */
        .bottom-section {
            width: 100%;
            background-color: white;
            padding: 100px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">MAIN</a></li>
            <li><a href="physics.html">Physics</a></li>
            <li><a href="device.html">Device</a></li>
            <li><a href="design.html">Design</a></li>
            <li><a href="notes.html">Notes</a></li>
        </ul>
    </nav>

    <div class="header">
        <h1>Semiconductor Engineering</h1>
        <p>반도체공학</p>
    </div>

    <div class="main-grid">
        <a href="physics.html" class="square-card">
            <h2>Basic Physics</h2>
            <p>양자 역학 및 에너지 밴드 이론</p>
        </a>
        <a href="device.html" class="square-card">
            <h2>Semiconductor Device</h2>
            <p>PN 접합 및 MOSFET의 원리</p>
        </a>
        <a href="design.html" class="square-card">
            <h2>Design & Simulation</h2>
            <p>회로 설계 및 시뮬레이션 기록</p>
        </a>
        <a href="notes.html" class="square-card">
            <h2>Notes</h2>
            <p>공부하며 어려웠던 점 정리</p>
        </a>
    </div>

    <div class="bottom-section">
        <div class="content-area">
            <p>이곳은 흰색 배경 영역입니다.</p>
        </div>
    </div>

</body>
</html>
