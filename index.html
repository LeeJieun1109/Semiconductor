<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semiconductor Engineering Portfolio</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        /* 기본 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            scroll-behavior: smooth;
        }

        /* 내비게이션 바 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #495057; /* 회색 */
            display: flex;
            align-items: center;
            z-index: 1000;
            border-bottom: 0.5px solid rgba(248, 249, 250, 0.2); /* 얇은 흰색 선 */
        }

        .navbar-item {
            position: absolute;
            color: #f8f9fa; /* 흰색 */
            text-decoration: none;
            font-size: 1.5rem; /* 기존 Portfolio 크기 */
            font-weight: bold;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }

        /* 마우스 올리면 10% 커짐 */
        .navbar-item:hover {
            transform: scale(1.1);
        }

        /* 위치 지정 (1/6 지점들) */
        .nav-1 { left: 16.66%; transform: translateX(-50%); }
        .nav-2 { left: 33.33%; transform: translateX(-50%); }
        .nav-3 { left: 50.00%; transform: translateX(-50%); }
        .nav-4 { left: 66.66%; transform: translateX(-50%); }
        .nav-5 { left: 83.33%; transform: translateX(-50%); }

        /* 섹션 공통 */
        section {
            width: 100%;
            height: 100vh; /* 화면 꽉 차게 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* 회색 배경 섹션 (1, 3번째) */
        .bg-gray { background-color: #495057; color: #f8f9fa; }
        /* 흰색 배경 섹션 (2, 4번째) */
        .bg-white { background-color: #f8f9fa; color: #495057; }

        /* 메인 제목 (첫 번째 섹션) */
        .main-title-container { text-align: center; }
        .main-title-en { font-size: 4.5rem; margin: 0; font-weight: 800; }
        .main-title-ko { 
            font-size: 2.7rem; /* 4.5 * 0.6 = 2.7 (5분의 3) */
            margin-top: 1rem; 
            font-weight: 400;
        }

        /* 1x4 사각형 카드 레이아웃 (두 번째 섹션) */
        .card-container {
            display: flex;
            justify-content: center;
            gap: 30px; /* 사각형 사이 여백 */
            width: 90%; /* 양 끝 여백 확보 */
            max-width: 1200px;
        }

        .round-card {
            flex: 1;
            height: 250px;
            background-color: #495057; /* 회색 */
            border-radius: 30px; /* 라운드 사각형 */
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s ease;
            padding: 20px;
            text-align: center;
        }

        .round-card:hover {
            transform: scale(1.05); /* 약간 커짐 */
        }

        .round-card span {
            color: #f8f9fa; /* 흰색 */
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* 하단 정보 영역 (#adb5bd) */
        .footer-info {
            width: 100%;
            height: 66.6vh; /* 100vh의 3분의 2 */
            background-color: #adb5bd;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .footer-table {
            width: 80%;
            display: flex;
            justify-content: space-between;
            color: black; /* 검은색 글씨 */
            font-size: 0.9rem; /* 작은 본문 크기 */
            text-align: center;
        }

        .footer-item { flex: 1; }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="navbar-item nav-1">MAIN</a>
        <a href="physics.html" class="navbar-item nav-2">Physics</a>
        <a href="device.html" class="navbar-item nav-3">Device</a>
        <a href="design.html" class="navbar-item nav-4">Design</a>
        <a href="notes.html" class="navbar-item nav-5">Notes</a>
    </nav>

    <section class="bg-gray">
        <div class="main-title-container">
            <h1 class="main-title-en">Semiconductor Engineering</h1>
            <div class="main-title-ko">반도체 공학</div>
        </div>
    </section>

    <section class="bg-white">
        <div class="card-container">
            <a href="physics.html" class="round-card"><span>Basic Physics</span></a>
            <a href="device.html" class="round-card"><span>Semiconductor Device</span></a>
            <a href="design.html" class="round-card"><span>Design & Simulation</span></a>
            <a href="notes.html" class="round-card"><span>Notes</span></a>
        </div>
    </section>

    <section class="bg-gray">
        <h2>Content Section 03</h2>
    </section>

    <section class="bg-white">
        <h2>Content Section 04</h2>
    </section>

    <div class="footer-info">
        <div class="footer-table">
            <div class="footer-item">2026 SCIENCE ARCHIVE</div>
            <div class="footer-item">10925 이지은B</div>
            <div class="footer-item">022247@hafs.hs.kr</div>
        </div>
    </div>

</body>
</html>
