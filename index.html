<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semiconductor Engineering Portfolio</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        /* 모든 요소에 프리텐다드 글꼴 적용 */
        * {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            scroll-behavior: smooth;
        }

        /* 1. 내비게이션 바: 두께 두껍게 (#495464) */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px; /* 두께를 조금 더 두껍게 설정 */
            background-color: #495464; 
            display: flex;
            align-items: center;
            z-index: 1000;
            border-bottom: 0.5px solid rgba(244, 244, 242, 0.2);
        }

        /* 내비게이션 텍스트: 기존의 80% 크기, 얇은 두께 */
        .navbar-item {
            position: absolute;
            color: #f4f4f2; 
            text-decoration: none;
            font-size: 1.2rem; /* 1.5rem의 80% 수준 */
            font-weight: 300; /* 더 얇게 설정 */
            transition: transform 0.3s ease;
            white-space: nowrap;
            display: inline-block;
            text-align: center;
            width: 100px; /* 고정 너비를 주어 텍스트 팽창 시 밀림 방지 */
        }

        /* 마우스 오버: 10%만 커짐 (밀림 방지를 위해 transform만 사용) */
        .navbar-item:hover {
            transform: translateX(-50%) scale(1.1);
        }

        /* 위치 지정 (1/6 지점들) */
        .nav-1 { left: 16.66%; transform: translateX(-50%); }
        .nav-2 { left: 33.33%; transform: translateX(-50%); }
        .nav-3 { left: 50.00%; transform: translateX(-50%); }
        .nav-4 { left: 66.66%; transform: translateX(-50%); }
        .nav-5 { left: 83.33%; transform: translateX(-50%); }

        /* 섹션 공통 */
        section {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* 배경색 변경 */
        .bg-gray { background-color: #495464; color: #f4f4f2; }
        .bg-white { background-color: #f4f4f2; color: #495464; }

        /* 메인 제목 */
        .main-title-container { text-align: center; }
        .main-title-en { font-size: 4.5rem; margin: 0; font-weight: 800; }
        .main-title-ko { 
            font-size: 2.7rem; 
            margin-top: 1rem; 
            font-weight: 400;
        }

        /* 카드 레이아웃 */
        .card-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 90%;
            max-width: 1200px;
        }

        .round-card {
            flex: 1;
            height: 250px;
            background-color: #495464;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s ease;
            padding: 20px;
            text-align: center;
        }

        .round-card:hover {
            transform: scale(1.05);
        }

        .round-card span {
            color: #f4f4f2;
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* 2. 하단 정보 영역: 높이 절반(33.3vh), 색상 #e8e8e8 */
        .footer-info {
            width: 100%;
            height: 33.3vh; /* 기존 66.6vh의 절반 */
            background-color: #e8e8e8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. 푸터 텍스트: 크기 300% 키움, 회색(#495464) */
        .footer-table {
            width: 90%;
            display: flex;
            justify-content: space-between;
            color: #495464; /* 검은색에서 회색으로 변경 */
            font-size: 2.7rem; /* 기존 0.9rem의 300% */
            text-align: center;
            font-weight: 600;
        }

        .footer-item { flex: 1; }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="navbar-item nav-1">MAIN</a>
        <a href="physics.html" class="navbar-item nav-2">Physics</a>
        <a href="device.html" class="navbar-item nav-3">Device</a>
        <a href="design.html" class="navbar-item nav-4">Design</a>
        <a href="notes.html" class="navbar-item nav-5">Notes</a>
    </nav>

    <section class="bg-gray">
        <div class="main-title-container">
            <h1 class="main-title-en">Semiconductor Engineering</h1>
            <div class="main-title-ko">반도체 공학</div>
        </div>
    </section>

    <section class="bg-white">
        <div class="card-container">
            <a href="physics.html" class="round-card"><span>Basic Physics</span></a>
            <a href="device.html" class="round-card"><span>Semiconductor Device</span></a>
            <a href="design.html" class="round-card"><span>Design & Simulation</span></a>
            <a href="notes.html" class="round-card"><span>Notes</span></a>
        </div>
    </section>

    <section class="bg-gray">
        <h2>Content Section 03</h2>
    </section>

    <section class="bg-white">
        <h2>Content Section 04</h2>
    </section>

    <div class="footer-info">
        <div class="footer-table">
            <div class="footer-item">2026 SCIENCE ARCHIVE</div>
            <div class="footer-item">10925 이지은B</div>
            <div class="footer-item">022247@hafs.hs.kr</div>
        </div>
    </div>

</body>
</html>
