<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Semiconductor Engineering Portfolio</title>
    <style>
        /* 1. 전체 배경 설정 */
        body {
            /* [배경색 변경] 여기서 아래의 #2c2c2c 코드를 원하는 색상 코드로 바꾸세요 */
            background-color: #2c2c2c; 
            margin: 0;
            padding: 50px 20px;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2. 제목 섹션 */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .header h1 {
            color: white;
            font-size: 3rem;
            margin: 0;
        }
        .header p {
            color: white;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* 3. 2x2 정사각형 그리드 */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(2, 200px); /* 2열 배치 */
            grid-gap: 20px;
            margin-bottom: 80px;
        }
        .square-card {
            width: 200px;
            height: 200px;
            background-color: white;
            border-radius: 20px; /* 둥근 모서리 */
            text-decoration: none; /* 링크 밑줄 제거 */
            color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.3s;
        }
        .square-card:hover { transform: scale(1.05); }
        .square-card h2 { font-size: 1.5rem; margin: 0; }
        .square-card p { font-size: 0.9rem; margin-top: 10px; }

        /* 4. 포트폴리오 섹션 */
        .portfolio-container {
            width: 420px; /* 그리드 너비와 맞춤 */
        }
        .portfolio-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
            color: white;
        }
        .portfolio-header h2 {
            font-size: 1.5rem; /* 정사각형 제목과 같은 크기 */
            margin: 0;
        }
        .portfolio-header a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* 5. 가로로 긴 직사각형 리스트 */
        .long-card {
            width: 100%;
            height: 60px;
            background-color: white;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            color: black;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Semiconductor Engineering</h1>
        <p>반도체공학</p>
    </div>

    <div class="main-grid">
        <a href="subpage.html" class="square-card">
            <h2>기초 물리</h2>
            <p>양자 역학 및 에너지 밴드 이론</p>
        </a>
        <a href="subpage.html" class="square-card">
            <h2>반도체 소자</h2>
            <p>PN 접합 및 MOSFET의 원리</p>
        </a>
        <a href="subpage.html" class="square-card">
            <h2>설계 기록</h2>
            <p>회로 설계 및 시뮬레이션 기록</p>
        </a>
        <a href="subpage.html" class="square-card">
            <h2>학습 노트</h2>
            <p>공부하며 어려웠던 점 정리</p>
        </a>
    </div>

    <div class="portfolio-container">
        <div class="portfolio-header">
            <h2>Portfolio</h2>
            <a href="portfolio-more.html">더 보기</a>
        </div>
        
        <a href="#" class="long-card">프로젝트 01: 옴의 법칙 시뮬레이터</a>
        <a href="#" class="long-card">프로젝트 02: 다이오드 정류 회로 실험</a>
        <a href="#" class="long-card">프로젝트 03: 증폭 회로 특성 분석</a>
        <a href="#" class="long-card">프로젝트 04: 논리 게이트 구현</a>
    </div>

</body>
</html>
