<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subpage - Semiconductor Engineering</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * {
            font-family: 'Pretendard', sans-serif;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #f4f4f2; /* 배경 전체 흰색 계열 */
        }

        /* 1. 내비게이션 바 (메인과 동일 유지) */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px; 
            background-color: #495464; 
            display: flex;
            align-items: center;
            z-index: 1000;
            border-bottom: 0.5px solid rgba(244, 244, 242, 0.2);
        }

        .navbar-item {
            position: absolute;
            color: #f4f4f2; 
            text-decoration: none;
            font-size: 1.2rem; 
            font-weight: 300; 
            transition: transform 0.3s ease;
            white-space: nowrap;
            display: inline-block;
            text-align: center;
            width: 100px;
        }

        .navbar-item:hover { transform: translateX(-50%) scale(1.1); }
        .nav-1 { left: 16.66%; transform: translateX(-50%); }
        .nav-2 { left: 33.33%; transform: translateX(-50%); }
        .nav-3 { left: 50.00%; transform: translateX(-50%); }
        .nav-4 { left: 66.66%; transform: translateX(-50%); }
        .nav-5 { left: 83.33%; transform: translateX(-50%); }

        /* 2. 하위 페이지 콘텐츠 레이아웃 */
        .container {
            width: 80%; /* 양쪽 여백 */
            max-width: 1200px;
            margin: 150px auto 50px; /* 내비게이션 바 아래로 적당히 내려옴 */
            text-align: left;
        }

        /* 페이지 제목 */
        .page-header {
            display: flex;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 20px;
        }

        .page-title-en {
            font-size: 3rem;
            color: #495464;
            font-weight: 800;
            margin: 0;
        }

        .page-title-ko {
            font-size: 2rem; /* 영문의 2/3 수준 */
            color: #495464;
            font-weight: 400;
            opacity: 0.8;
        }

        /* 구분선 */
        .divider {
            width: 100%;
            height: 1px;
            background-color: #495464;
            opacity: 0.3;
            margin-bottom: 40px;
        }

        /* 3. 리스트 아이템 (가로로 긴 사각형) */
        .list-item {
            width: 100%;
            height: 100px;
            background-color: #f4f4f2;
            border: 1px solid #495464; /* 회색 테두리 */
            border-radius: 20px; /* 부드러운 곡선 */
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* 마우스 올릴 때 효과 */
        .list-item:hover {
            transform: scale(1.03); /* 겹치지 않게 3% 정도로 조정 */
            box-shadow: 0 5px 15px rgba(73, 84, 100, 0.15); /* 자연스러운 회색 그림자 */
            z-index: 10;
        }

        /* 왼쪽 제목 (1/10 지점) */
        .item-title {
            position: absolute;
            left: 10%;
            font-size: 1.5rem;
            color: #495464;
            font-weight: 600;
        }

        /* 오른쪽 세로선 (3/4 지점) */
        .item-v-line {
            position: absolute;
            left: 75%;
            width: 1px;
            height: 40px;
            background-color: #495464;
            opacity: 0.3;
        }

        /* 오른쪽 날짜 (세로선 오른쪽) */
        .item-date {
            position: absolute;
            left: 78%;
            font-size: 1.5rem;
            color: #495464;
            font-weight: 300;
        }

        /* 하단 정보 영역 (#e8e8e8, 높이 33.3vh) */
        .footer-info {
            width: 100%;
            height: 33.3vh;
            background-color: #e8e8e8;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 100px; /* 리스트와 푸터 사이의 간격 */
        }

        /* 푸터 텍스트: 내비게이션 크기보다 5% 작게, 회색 */
        .footer-table {
            width: 85%;
            display: flex;
            justify-content: space-between;
            color: #495464; 
            font-size: 1.14rem; 
            text-align: center;
            font-weight: 400;
        }

        .footer-item { flex: 1; }

    </style>
</head>

        </a>

        <a href="#" class="list-item">

            <div class="item-v-line"></div>

        </a>

        <a href="#" class="list-item">
            <div class="item-title">프로젝트 제목 또는 게시글 제목 03</div>
            <div class="item-v-line"></div>
            <div class="item-date">2026.05.16</div>
        </a>

        <a href="#" class="list-item">
            <div class="item-title">프로젝트 제목 또는 게시글 제목 04</div>
            <div class="item-v-line"></div>
            <div class="item-date">2026.05.17</div>
        </a>
    </div>

    <div class="footer-info">
        <div class="footer-table">
            <div class="footer-item">2026 SCIENCE ARCHIVE</div>
            <div class="footer-item">10925 이지은B</div>
            <div class="footer-item">022247@hafs.hs.kr</div>
        </div>
    </div>
    
</body>
</html>
