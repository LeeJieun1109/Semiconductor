<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semiconductor Engineering Portfolio</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            scroll-behavior: smooth;
        }

        /* 내비게이션 바 (#495464) */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px; 
            background-color: #495464; 
            display: flex;
            align-items: center;
            z-index: 1000;
            border-bottom: 0.5px solid rgba(244, 244, 242, 0.2);
        }

        .navbar-item {
            position: absolute;
            color: #f4f4f2; 
            text-decoration: none;
            font-size: 1.2rem; 
            font-weight: 300; 
            transition: transform 0.3s ease;
            white-space: nowrap;
            display: inline-block;
            text-align: center;
            width: 100px;
        }

        .navbar-item:hover {
            transform: translateX(-50%) scale(1.1);
        }

        .nav-1 { left: 16.66%; transform: translateX(-50%); }
        .nav-2 { left: 33.33%; transform: translateX(-50%); }
        .nav-3 { left: 50.00%; transform: translateX(-50%); }
        .nav-4 { left: 66.66%; transform: translateX(-50%); }
        .nav-5 { left: 83.33%; transform: translateX(-50%); }

        /* 섹션 공통 */
        section {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-gray { background-color: #495464; color: #f4f4f2; }
        .bg-white { background-color: #f4f4f2; color: #495464; }

        /* 메인 제목 섹션 */
        .main-title-container { text-align: center; }
        .main-title-en { font-size: 4.5rem; margin: 0; font-weight: 800; }
        .main-title-ko { 
            font-size: 1.5rem; 
            margin-top: 1.5rem; 
            font-weight: 400;
            letter-spacing: 0.1rem;
        }

        /* 카드 레이아웃 */
        .card-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 90%;
            max-width: 1200px;
        }

        .round-card {
            flex: 1;
            height: 250px;
            background-color: #495464;
            border-radius: 30px;
            display: flex;
            flex-direction: column; /* 텍스트를 세로로 배치하기 위해 수정 */
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s ease;
            padding: 20px;
            text-align: center;
        }

        .round-card:hover { transform: scale(1.05); }
        
        /* 카드 내 영문 텍스트 */
        .card-en { 
            color: #f4f4f2; 
            font-size: 1.5rem; 
            font-weight: bold; 
            margin: 0;
        }

        /* 카드 내 한글 텍스트 (영문의 3/5 크기, 약 0.9rem) */
        .card-ko {
            color: #f4f4f2;
            font-size: 0.9rem;
            font-weight: 400;
            margin-top: 8px; /* 영문과의 간격 */
            opacity: 0.9; /* 살짝 투명도를 주어 영문을 더 강조 */
        }

        /* 하단 정보 영역 */
        .footer-info {
            width: 100%;
            height: 33.3vh;
            background-color: #e8e8e8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .footer-table {
            width: 85%;
            display: flex;
            justify-content: space-between;
            color: #495464; 
            font-size: 1.14rem; 
            text-align: center;
            font-weight: 400;
        }

        .footer-item { flex: 1; }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="navbar-item nav-1">MAIN</a>
        <a href="physics.html" class="navbar-item nav-2">Physics</a>
        <a href="device.html" class="navbar-item nav-3">Device</a>
        <a href="design.html" class="navbar-item nav-4">Design</a>
        <a href="notes.html" class="navbar-item nav-5">Notes</a>
    </nav>

    <section class="bg-gray">
        <div class="main-title-container">
            <h1 class="main-title-en">Semiconductor Engineering</h1>
            <div class="main-title-ko">반도체 공학</div>
        </div>
    </section>

    <section class="bg-white">
        <div class="card-container">
            <a href="physics.html" class="round-card">
                <p class="card-en">Basic Physics</p>
                <p class="card-ko">기초 물리</p>
            </a>
            <a href="device.html" class="round-card">
                <p class="card-en">Semiconductor Device</p>
                <p class="card-ko">반도체 소자</p>
            </a>
            <a href="design.html" class="round-card">
                <p class="card-en">Design & Simulation</p>
                <p class="card-ko">설계 및 시뮬레이션</p>
            </a>
            <a href="notes.html" class="round-card">
                <p class="card-en">Notes</p>
                <p class="card-ko">노트</p>
            </a>
        </div>
    </section>

    <section class="bg-gray">
        <h2>Content Section 03</h2>
    </section>

    <section class="bg-white">
        <h2>Content Section 04</h2>
    </section>

    <div class="footer-info">
        <div class="footer-table">
            <div class="footer-item">2026 SCIENCE ARCHIVE</div>
            <div class="footer-item">10925 이지은B</div>
            <div class="footer-item">022247@hafs.hs.kr</div>
        </div>
    </div>

</body>
</html>
